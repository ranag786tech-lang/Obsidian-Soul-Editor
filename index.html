<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevAssist | Obsidian Soul Edition</title>
    <style>
        /* THE SOUL OF OBSIDIAN - PREMIUM DESIGN */
        :root {
            --obsidian-deep: #050505;
            --obsidian-glass: rgba(15, 15, 15, 0.85);
            --pure-white: #ffffff;
            --soft-white: rgba(255, 255, 255, 0.6);
            --glow: 0 0 20px rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--obsidian-deep);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            color: var(--pure-white);
            overflow: hidden;
        }

        /* SPLIT SCREEN LAYOUT */
        #main-app {
            display: flex;
            width: 100vw;
            height: 100vh;
            padding: 15px;
            gap: 15px;
        }

        /* EDITOR STYLING */
        .panel {
            flex: 1;
            background: var(--obsidian-glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--glow);
        }

        .panel-header {
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.03);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
        }

        #code-editor {
            flex: 1;
            background: transparent;
            border: none;
            color: #efefef;
            padding: 20px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 15px;
            line-height: 1.6;
            outline: none;
            resize: none;
        }

        /* PREVIEW STYLING (The White Canvas) */
        #live-preview-panel {
            background: #ffffff;
            border: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        iframe { width: 100%; height: 100%; border: none; border-radius: 0 0 16px 16px; }

        /* FLOATING AI ASSISTANT - THE "EYE" */
        #ai-sphere {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 70px;
            height: 70px;
            background: var(--pure-white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255,255,255,0.4);
            z-index: 100;
        }

        #ai-sphere:hover { transform: scale(1.1) rotate(90deg); }

        .iris {
            width: 25px;
            height: 25px;
            background: var(--obsidian-deep);
            border-radius: 50%;
            animation: breathe 3s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        /* THE OBSIDIAN OVERLAY */
        #ai-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99;
            opacity: 0;
            pointer-events: none;
            backdrop-filter: blur(20px);
        }

        #ai-overlay.visible { opacity: 1; pointer-events: auto; }

        .terminal-text {
            font-family: monospace;
            font-size: 24px;
            text-align: center;
            max-width: 80%;
        }
    </style>
</head>
<body>

<div id="main-app">
    <div class="panel">
        <div class="panel-header">
            <span>Obsidian Editor v1.0</span>
            <span id="status" style="color: #555;">● Offline</span>
        </div>
        <textarea id="code-editor" spellcheck="false"></textarea>
    </div>

    <div class="panel" id="live-preview-panel">
        <div class="panel-header" style="color: #888; background: #f9f9f9;">
            <span>Live Scene Preview</span>
        </div>
        <iframe id="preview-frame"></iframe>
    </div>
</div>

<div id="ai-sphere" onclick="summonAI()">
    <div class="iris"></div>
</div>

<div id="ai-overlay" onclick="dismissAI()">
    <div class="terminal-text" id="ai-msg"></div>
</div>

<script>
    const editor = document.getElementById('code-editor');
    const preview = document.getElementById('preview-frame');
    const msgBox = document.getElementById('ai-msg');
    const overlay = document.getElementById('ai-overlay');

    // MUTATION ENGINE
    function mutate() {
        const content = editor.value;
        const blob = new Blob([content], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        preview.src = url;
        preview.onload = () => URL.revokeObjectURL(url);
        document.getElementById('status').style.color = '#fff';
        setTimeout(() => document.getElementById('status').style.color = '#555', 500);
    }
    editor.addEventListener('input', mutate);

    // AI SUMMONING (VOICE + TEXT)
    function summonAI() {
        overlay.classList.add('visible');
        const lines = ["Initializing Digital Serenity...", "Obsidian UI Loaded.", "How can I help you build today, brother?"];
        let i = 0;
        msgBox.innerHTML = "";
        
        function typeWriter() {
            if (i < lines.length) {
                msgBox.innerHTML += lines[i] + "<br>";
                const utterance = new SpeechSynthesisUtterance(lines[i]);
                utterance.pitch = 0.7; // Deep tech voice
                window.speechSynthesis.speak(utterance);
                i++;
                setTimeout(typeWriter, 1200);
            }
        }
        typeWriter();
    }

    function dismissAI() {
        overlay.classList.remove('visible');
    }

    // STARTER TEMPLATE
    editor.value = `<html>\n<style>\n  body { background: #000; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }\n  h1 { border: 2px solid white; padding: 20px; text-transform: uppercase; letter-spacing: 5px; }\n</style>\n<body>\n  <h1>Creation Mode</h1>\n</body>\n</html>`;
    mutate();
</script>

</body>
  </html>
